version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 1
    labels:
      - deps
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      all-others:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 1
    labels:
      - deps
      - ci
    commit-message:
      prefix: "chore(ci)"
    groups:
      all-others:
        patterns:
          - "*"
