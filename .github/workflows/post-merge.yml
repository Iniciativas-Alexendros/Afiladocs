# ═══════════════════════════════════════════════════════════════════════════════
# post-merge · afiladocs · piloto
#
# Apunta al SHA pinned be5a8dd (PR #20 merge en plantillas) hasta tag v1.0.0.
# Detect-stack identifica TS (Next.js) + Docker (Dockerfile) + Markdown.
# ═══════════════════════════════════════════════════════════════════════════════

name: post-merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write
  checks: write
  packages: write
  security-events: write

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: Alexendros/plantillas/.github/workflows/_lib-post-merge.yml@be5a8dd
    with:
      enable_linters: true
      enable_sbom: true
      enable_attest: true
      enable_release: false      # afiladocs publica vía Vercel, no via release-please todavía
    secrets: inherit
