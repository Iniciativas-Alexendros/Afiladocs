# ═══════════════════════════════════════════════════════════════════════════════
# post-merge · afiladocs · piloto
#
# Apunta al SHA pinned be5a8dd8c56cb2f9ac1455174072832928bb1643 (PR #20 merge
# en plantillas). Detect-stack identifica TS (Next.js) + Docker (Dockerfile) + Markdown.
# ═══════════════════════════════════════════════════════════════════════════════

name: post-merge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  attestations: write
  checks: write
  packages: write
  security-events: write

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: Iniciativas-Alexendros/plantillas/.github/workflows/_lib-post-merge.yml@be5a8dd8c56cb2f9ac1455174072832928bb1643 # v1.0.0
    with:
      enable_linters: true
      enable_sbom: true
      enable_attest: true
      enable_release: false # afiladocs publica vía Vercel, no via release-please todavía
    # El reusable no declara secrets en workflow_call; usa GITHUB_TOKEN implícito + OIDC.
