name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# Cancela runs anteriores de la misma rama/PR cuando llega un push nuevo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Placeholders compartidos por todos los steps. No son secretos: Stripe/Resend
    # no se contactan en build, y Supabase/DB sólo se consultan en runtime.
    # Los lazy getters de src/lib/env.ts leen estos valores en el momento de acceso,
    # no en build, así que basta con que existan para que prisma generate y
    # next build no lancen "missing env".
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      NEXT_PUBLIC_SITE_URL: https://afiladocs.com
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      RESEND_API_KEY: re_placeholder
      CRON_SECRET: placeholder
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # npm ci falla con optional platform deps en el lockfile generado por npm 11
        run: npm install
        env:
          # prisma generate (postinstall) necesita una URL válida para leer el schema,
          # pero NO conecta a la BD. Usamos un placeholder para el runner de CI.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Validate .env.example coverage
        run: npm run check:env

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Workflow audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Lint GitHub Actions with actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash | bash
          ./actionlint -color
        shell: bash

      - name: Audit workflows with zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: false
