# Propósito: Pipeline DevSecOps para Next.js 15 en Vercel
# Deploy exclusivo vía Vercel — los jobs VPS (rsync/PM2) han sido eliminados
# ya que next.config.ts no usa output:standalone (incompatible con Vercel).

image: node:22-alpine

stages:
  - build
  - test
  - security
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  SECURE_LOG_LEVEL: "info"
  SAST_EXCLUDED_PATHS: "spec, test, tests, tmp, node_modules, .next"
  NODE_ENV: "production"

cache:
  key:
    files:
      - package-lock.json
    prefix: node22
  paths:
    - .npm/
    - .next/cache/

# ---------------------------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------------------------
build_job:
  stage: build
  script:
    # npm ci no tiene flag --audit (ese es npm audit); --prefer-offline reduce latencia
    - npm ci --include=dev --prefer-offline
    - npm run build
  artifacts:
    paths:
      # .next/ completo para vercel deploy --prebuilt
      - .next/
      - public/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# TESTING / QUALITY GATES
# ---------------------------------------------------------------------------
test_lint:
  stage: test
  script:
    - npm ci --include=dev --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run lint
  needs: ["build_job"]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test_types:
  stage: test
  script:
    - npm ci --include=dev --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run typecheck
  needs: ["build_job"]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test_unit:
  stage: test
  script:
    - npm ci --include=dev --prefer-offline --ignore-scripts
    - npx prisma generate
    - npm run test:coverage
  needs: ["build_job"]
  coverage: '/Statements\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Auditoría de dependencias — non-blocking hasta que el baseline esté limpio
test_audit:
  stage: test
  script:
    - npm ci --include=dev --prefer-offline --ignore-scripts
    - npm audit --audit-level=high
  needs: ["build_job"]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# SECURITY SCANNING STAGE
# (GitLab Ultimate templates — SAST, Secret Detection, Dependency Scanning)
# ---------------------------------------------------------------------------
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

# ---------------------------------------------------------------------------
# DEPLOYMENT VERCEL (canal único de producción)
# ---------------------------------------------------------------------------
# Variables CI/CD requeridas en GitLab (Settings > CI/CD > Variables):
#   VERCEL_TOKEN        — Vercel Dashboard > Account > Tokens
#   VERCEL_ORG_ID       — de .vercel/project.json (tras primer `vercel link`)
#   VERCEL_PROJECT_ID   — de .vercel/project.json
#   VERCEL_DEPLOY_URL   — URL del deployment (ej. https://afiladocs.vercel.app)
deploy_vercel:
  stage: deploy
  image: node:22-alpine
  script:
    - npm install -g vercel
    # Descarga configuración del proyecto Vercel (vercel.json, env vars)
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    # Build en el entorno Vercel (genera .vercel/output/)
    - vercel build --prod --token=$VERCEL_TOKEN
    # Deploy del artifact prebuilt — no re-ejecuta el build en Vercel
    - DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
    # Smoke test post-deploy: verifica que el health endpoint responde
    - apk add --no-cache curl
    - 'curl -f --retry 5 --retry-delay 10 "${DEPLOY_URL}/api/health" || (echo "Health check failed after deploy" && exit 1)'
  environment:
    name: production-vercel
    url: $VERCEL_DEPLOY_URL
  needs:
    - job: "build_job"
    - job: "test_lint"
    - job: "test_types"
    - job: "test_unit"
    - job: "sast"
      optional: true
    - job: "secret_detection"
      optional: true
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
